version: "3.8"

services:
  mongodb:
    image: mongo:7.0
    container_name: food_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: food_delivery
    volumes:
      - mongo_data:/data/db
    networks:
      - food_net

  redis:
    image: redis:7-alpine
    container_name: food_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - food_net

  neo4j:
    image: neo4j:5.18
    container_name: food_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - food_net

  cassandra:
    image: cassandra:4.1
    container_name: food_cassandra
    restart: unless-stopped
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: FoodDeliveryCluster
      CASSANDRA_DC: datacenter1
      HEAP_NEWSIZE: 128M
      MAX_HEAP_SIZE: 512M
    volumes:
      - cassandra_data:/var/lib/cassandra
    networks:
      - food_net
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces'"]
      interval: 30s
      timeout: 10s
      retries: 10

volumes:
  mongo_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  cassandra_data:

networks:
  food_net:
    driver: bridge
